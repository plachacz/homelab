global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - 'alert_rules.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'ubuntu-server'
    static_configs:
      - targets: ['192.168.10.50:9100']
        labels:
          host: 'ubuntu-monitor'

  - job_name: 'windows-server'
    static_configs:
      - targets: ['192.168.10.10:9182']
        labels:
          host: 'dc01'
          os: 'windows'