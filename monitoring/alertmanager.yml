global:
  slack_api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'host']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'slack-all'
  routes:
    - match:
        severity: critical
      receiver: 'slack-critical'
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: 'slack-warning'

receivers:
  - name: 'slack-critical'
    slack_configs:
      - channel: '#homelab-alerts'
        send_resolved: true
        icon_emoji: ':fire:'
        username: 'Homelab Alerts'
        title: ':rotating_light: KRYTYCZNY: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Host:* {{ .Labels.host | default .Labels.instance }}
          *Opis:* {{ .Annotations.description }}
          {{ end }}
        color: '#FF0000'

  - name: 'slack-warning'
    slack_configs:
      - channel: '#homelab-alerts'
        send_resolved: true
        icon_emoji: ':warning:'
        username: 'Homelab Alerts'
        title: ':warning: OSTRZEŻENIE: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Host:* {{ .Labels.host | default .Labels.instance }}
          *Opis:* {{ .Annotations.description }}
          {{ end }}
        color: '#FFA500'

  - name: 'slack-all'
    slack_configs:
      - channel: '#homelab-alerts'
        send_resolved: true
        title: 'Alert: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'